name: cluster-log-ai

# Multi-Projekt-Setup:
#   Pro Projekt ein eigener analyzer-Container mit eigener config.<slug>.yaml.
#   Alle Analyzer schreiben in dieselbe Postgres-DB; differenziert wird ueber
#   project.slug (siehe projects-Tabelle).
#
#   Neues Projekt hinzufuegen:
#     1. cp config.firma-xyz.yaml.example config.firma-xyz.yaml und anpassen
#     2. unten den auskommentierten analyzer-firma-xyz Service aktivieren
#     3. docker compose up -d --build analyzer-firma-xyz

services:
  db:
    image: postgres:16-alpine
    container_name: cluster-log-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clusterlogai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-clusterlogai}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clusterlogai} -d ${POSTGRES_DB:-clusterlogai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Projekt: ensy-prod -----------------------------------------------
  analyzer-ensy-prod:
    build: .
    container_name: cluster-log-ai-analyzer-ensy-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Wird von db.py bevorzugt vor config.yaml gelesen
      DATABASE_URL: postgresql://${POSTGRES_USER:-clusterlogai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clusterlogai}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      # config.yaml read-only mounten, damit Secrets nicht ins Image wandern
      - ./config.yaml:/app/config/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---- Projekt: firma-xyz (Beispiel, auskommentiert) -------------------
  # Vorbereitung:
  #   cp config.firma-xyz.yaml.example config.firma-xyz.yaml
  #   Werte anpassen, dann diesen Block einkommentieren und
  #   `docker compose up -d --build analyzer-firma-xyz`.
  #
  # analyzer-firma-xyz:
  #   build: .
  #   container_name: cluster-log-ai-analyzer-firma-xyz
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-clusterlogai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clusterlogai}
  #     TZ: ${TZ:-Europe/Berlin}
  #   volumes:
  #     - ./config.firma-xyz.yaml:/app/config/config.yaml:ro
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"

volumes:
  db_data:
