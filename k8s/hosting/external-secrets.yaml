apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-mycelcore
  namespace: internal-tools
  labels:
    app.kubernetes.io/part-of: cluster-log-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: ghcr-mycelcore
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: secret/cluster/ghcr
        property: username
    - secretKey: password
      remoteRef:
        key: secret/cluster/ghcr
        property: token
